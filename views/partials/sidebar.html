{{define "sidebar"}}
<!-- Sidebar -->
<aside id="sidebar"
       class="hidden lg:flex flex-col absolute z-40 left-0 top-0 lg:static lg:left-auto lg:top-auto lg:translate-x-0 h-screen overflow-y-auto w-64 lg:sidebar-expanded:!w-64 2xl:sidebar-expanded:!w-64 shrink-0 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 p-4 transition-all duration-200 ease-in-out">

    <!-- Sidebar header -->
    <div class="flex justify-between mb-10 pr-3 sm:px-2">
        <!-- Logo -->
        <a class="flex items-center space-x-3 rtl:space-x-reverse" href="/"> <!-- Link logo to dashboard/home -->
            <img class="w-auto h-10 p-1 bg-gray-100 dark:bg-gray-800 rounded-md" src="/assets/img/logo.png" alt="Controtto Logo">
            <span class="text-2xl font-semibold text-gray-800 dark:text-white whitespace-nowrap">Controtto</span>
        </a>
        <!-- Sidebar Close Button (Hidden for now, can be enabled for collapsible sidebar) -->
        <!-- <button class="lg:hidden text-slate-500 hover:text-slate-400" @click.stop="sidebarOpen = !sidebarOpen" aria-controls="sidebar" :aria-expanded="sidebarOpen">
             <span class="sr-only">Close sidebar</span>
             <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                 <path d="M10.7 18.7l1.4-1.4L7.8 13H20v-2H7.8l4.3-4.3-1.4-1.4L4 12z"></path>
             </svg>
        </button> -->
    </div>

    <!-- Links -->
    <div class="space-y-2">
        <nav>
             <!-- Using a list for better semantics -->
             <ul class="space-y-2 font-medium">
                 <li>
                     <a href="#"
                        hx-get="/dashboard" hx-swap="innerHTML" hx-target="#contenido" hx-indicator="#loading-indicator"
                        _="on htmx:afterRequest from the body if event.detail.pathInfo.requestPath matches /dashboard call handleActive(me) end"
                        class="sidebar-nav-button group flex items-center p-2 text-gray-700 rounded-lg dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">
                         <!-- Icon (Replace with actual SVG or Font Awesome if preferred) -->
                         <svg class="w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 22 21">
                            <path d="M16.975 11H10V4.025a1 1 0 0 0-1.066-.998 8.5 8.5 0 1 0 9.039 9.039.999.999 0 0 0-1-1.066h.002Z"/>
                            <path d="M12.5 0c-.157 0-.311.01-.565.027A1 1 0 0 0 11 1.02V10h8.975a1 1 0 0 0 1-.934A8.5 8.5 0 0 0 12.5 0Z"/>
                         </svg>
                         <span class="ms-3">Dashboard</span>
                     </a>
                 </li>
                 <li>
                      <a href="#"
                         hx-get="/pairs" hx-swap="innerHTML" hx-target="#contenido" hx-indicator="#loading-indicator"
                         _="on htmx:afterRequest from the body if event.detail.pathInfo.requestPath matches /pairs call handleActive(me) end"
                         class="sidebar-nav-button group flex items-center p-2 text-gray-700 rounded-lg dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">
                          <!-- Icon (Simplified - replace if needed) -->
                          <svg class="flex-shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 18 20">
                            <path d="M17 5.923A1 1 0 0 0 16 5h-3V4a4 4 0 1 0-8 0v1H2a1 1 0 0 0-1 .923L.086 17.846A2 2 0 0 0 2.08 20h13.84a2 2 0 0 0 1.994-2.153L17 5.923ZM7 9a1 1 0 0 1-2 0V7h2v2Zm0-5a2 2 0 1 1 4 0v1H7V4Zm6 5a1 1 0 1 1-2 0V7h2v2Z"/>
                          </svg>
                          <span class="flex-1 ms-3 whitespace-nowrap">Pairs / Tradings</span>
                      </a>
                 </li>
                 <li>
                      <a href="#"
                         disabled
                         class="sidebar-nav-button group flex items-center p-2 text-gray-400 dark:text-gray-600 rounded-lg cursor-not-allowed opacity-60">
                          <!-- Icon -->
                          <svg class="flex-shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 18">
                             <path d="M14 2a3.963 3.963 0 0 0-1.4.267 6.439 6.439 0 0 1-1.331 6.638A4 4 0 1 0 14 2Zm1 9h-1.264A6.957 6.957 0 0 1 15 15v2a2.97 2.97 0 0 1-.184 1H19a1 1 0 0 0 1-1v-1a5.006 5.006 0 0 0-5-5ZM6.5 9a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9ZM8 10H5a5.006 5.006 0 0 0-5 5v2a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-2a5.006 5.006 0 0 0-5-5Z"/>
                          </svg>
                          <span class="flex-1 ms-3 whitespace-nowrap">Accounts</span>
                      </a>
                 </li>
                 <li>
                     <a href="#"
                        hx-get="/settings" hx-swap="innerHTML" hx-target="#contenido" hx-indicator="#loading-indicator"
                         _="on htmx:afterRequest from the body if event.detail.pathInfo.requestPath matches /settings call handleActive(me) end"
                        class="sidebar-nav-button group flex items-center p-2 text-gray-700 rounded-lg dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">
                         <!-- Icon -->
                         <svg class="flex-shrink-0 w-5 h-5 text-gray-500 transition duration-75 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M18 7.5h-.423l-.452-1.09.3-.3a1.5 1.5 0 0 0 0-2.121L16.01 2.575a1.5 1.5 0 0 0-2.121 0l-.3.3-1.089-.452V2a1.5 1.5 0 0 0-3 0v.423l-1.09.452-.3-.3a1.5 1.5 0 0 0-2.121 0L2.576 3.99a1.5 1.5 0 0 0 0 2.121l.3.3L2.423 7.5H2a1.5 1.5 0 0 0 0 3h.423l.452 1.09-.3.3a1.5 1.5 0 0 0 0 2.121l1.414 1.414a1.5 1.5 0 0 0 2.121 0l.3-.3 1.09.452V18a1.5 1.5 0 0 0 3 0v-.423l1.09-.452.3.3a1.5 1.5 0 0 0 2.121 0l1.414-1.414a1.5 1.5 0 0 0 0-2.121l-.3-.3.452-1.09H18a1.5 1.5 0 0 0 0-3Zm-6 4a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"/>
                         </svg>
                         <span class="flex-1 ms-3 whitespace-nowrap">Settings</span>
                     </a>
                 </li>
             </ul>
        </nav>
    </div>

    <!-- Hyperscript function for active state -->
    <script type="text/hyperscript">
      def handleActive(element)
        log "Handling active state for path:", event.detail.pathInfo.requestPath
        -- Remove active class from all buttons first
        remove .sidebar-active from .sidebar-nav-button
        -- Add active class to the clicked/matched button
        add .sidebar-active to element
      end
    </script>

    <!-- Define active styles (Tailwind doesn't have a direct 'active nav' concept) -->
    <style>
      .sidebar-active {
        @apply bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white;
      }
      .sidebar-active svg {
         @apply text-gray-900 dark:text-white;
      }
      /* Add styles for loading indicator if not already global */
      .htmx-indicator {
          opacity: 0;
          transition: opacity 300ms ease-in;
      }
      .htmx-request .htmx-indicator {
          opacity: 1;
      }
      .htmx-request.htmx-indicator {
          opacity: 1;
      }
    </style>

</aside>
{{end}}
