{{define "header"}}
<header class="sticky top-0 z-50 bg-white dark:bg-gray-900 shadow-md h-16">
    <div class="container mx-auto px-4 flex items-center justify-between h-full">
        <!-- Left side: Maybe a logo or title later -->
        <div class="flex items-center">
           <span class="text-xl font-semibold text-gray-800 dark:text-white">Trading App</span>
        </div>

        <!-- Right side: Theme Toggle -->
        <div class="flex items-center">
            <button id="theme-toggle"
                    _="on click
                       get localStorage.getItem('theme') giving currentTheme
                       if currentTheme is 'dark'
                         set newTheme to 'light'
                       else
                         set newTheme to 'dark'
                       end
                       set localStorage.theme to newTheme
                       if newTheme is 'dark'
                         add .dark to <html/>
                         add .hidden to #theme-toggle-light-icon
                         remove .hidden from #theme-toggle-dark-icon
                       else
                         remove .dark from <html/>
                         remove .hidden from #theme-toggle-light-icon
                         add .hidden to #theme-toggle-dark-icon
                       end"
                    class="p-2 rounded-md text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <span class="sr-only">Toggle theme</span>
                <!-- Sun icon (shown in dark mode) -->
                <svg id="theme-toggle-dark-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg id="theme-toggle-light-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
            <!-- Initial state check script -->
             <script>
                // Set initial icon visibility based on theme
                (function() {
                    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        document.getElementById('theme-toggle-dark-icon').classList.remove('hidden');
                    } else {
                        document.getElementById('theme-toggle-light-icon').classList.remove('hidden');
                    }
                })();
            </script>
        </div>
    </div>
</header>
{{end}}
